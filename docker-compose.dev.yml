
services:
  postgres:
    image: postgres:15-alpine
    container_name: tradeplus-postgres
    restart: always
    ports:
      - '5432:5432'
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: tradeplus-redis
    restart: always
    ports:
      - '6379:6379'
  minio:
    image: minio/minio:latest
    container_name: tradeplus-minio
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
volumes:
  postgres_data:
  minio_data: